name: Supabase table snapshot

on:
  schedule:
    - cron: "37 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: supabase-table-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Sync latest main
        run: git pull --ff-only origin main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Capture Supabase tables
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SCHEMA: ${{ secrets.SUPABASE_SCHEMA }}
          SUPABASE_TABLES: ${{ secrets.SUPABASE_TABLES }}
          SNAPSHOT_PAGE_SIZE: ${{ secrets.SNAPSHOT_PAGE_SIZE }}
          SNAPSHOT_RETENTION_DAYS: ${{ vars.SNAPSHOT_RETENTION_DAYS || '30' }}
        run: npm run snapshot

      - name: Upload latest snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-snapshot
          path: snapshots/latest
          if-no-files-found: error

      - name: Commit snapshot changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update Supabase table snapshot"
          file_pattern: snapshots/**/*.json
